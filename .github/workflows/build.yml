name: Build WDA IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install dependencies
        run: |
          brew install carthage || true

      - name: Bootstrap
        run: |
          ./Scripts/bootstrap.sh -d

      - name: Build WebDriverAgentRunner
        run: |
          xcodebuild \
          -project WebDriverAgent.xcodeproj \
          -scheme WebDriverAgentRunner \
          -destination generic/platform=iOS \
          CODE_SIGNING_ALLOWED=NO \
          build

      - name: Package IPA
        run: |
          mkdir Payload
          cp -R Build/Products/Debug-iphoneos/WebDriverAgentRunner-Runner.app Payload/
          zip -r WebDriverAgentRunner.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-IPA
          path: WebDriverAgentRunner.ipa